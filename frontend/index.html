<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrivDect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 30px; color: #e94560; }
        .status {
            font-size: 18px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
        }
        .status.running { background: #0f9b0f; }
        .status.stopped { background: #333; }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .start { background: #0f9b0f; color: #fff; }
        .stop { background: #e94560; color: #fff; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DrivDect</h1>
        <div id="status" class="status stopped">Status: Stopped</div>
        <button id="startBtn" class="start" onclick="startDetection()">Start Detection</button>
        <button id="stopBtn" class="stop" onclick="stopDetection()" disabled>Stop Detection</button>
    </div>
    <script>
        const API = window.location.origin;
        async function updateStatus() {
            const res = await fetch(`${API}/api/status`);
            const data = await res.json();
            const el = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            if (data.running) {
                el.className = 'status running';
                el.textContent = 'Status: Running';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                el.className = 'status stopped';
                el.textContent = 'Status: Stopped';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        async function startDetection() {
            await fetch(`${API}/api/start-detection`, { method: 'POST' });
            updateStatus();
        }
        async function stopDetection() {
            await fetch(`${API}/api/stop-detection`, { method: 'POST' });
            updateStatus();
        }
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
